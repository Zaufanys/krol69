name: Generate Snake Animation

on:
  schedule:
    # Regenerate the contribution snake once a day
    - cron: "0 0 * * *"
  # Allow manual triggering from the Actions tab
  workflow_dispatch:
  # Regenerate on every push to main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake game from contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=%238B0000&color_dots=%23161b22,%23555555,%23999999,%23cccccc,%23ffffff
            dist/github-snake-dark.svg?color_snake=%238B0000&color_dots=%23161b22,%23555555,%23999999,%23cccccc,%23ffffff

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
