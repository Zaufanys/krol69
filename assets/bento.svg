<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" width="1280" height="300" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <radialGradient id="gAbout" cx="15%" cy="24%" r="80%">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#7C3AED" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gLearn" cx="85%" cy="12%" r="100%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gCraft" cx="85%" cy="18%" r="100%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="26"/></filter>
    <clipPath id="cA"><rect x="0" y="0" width="836" height="300" rx="22"/></clipPath>
    <clipPath id="cL"><rect x="860" y="0" width="420" height="140" rx="22"/></clipPath>
    <clipPath id="cC"><rect x="860" y="160" width="420" height="140" rx="22"/></clipPath>
  </defs>

  <!-- ABOUT (glass) -->
  <g clip-path="url(#cA)">
    <rect x="0" y="0" width="836" height="300" fill="#0A0A0C"/>
    <g filter="url(#glow)"><ellipse cx="150" cy="70" rx="260" ry="180" fill="url(#gAbout)"/></g>
    <rect x="0" y="0" width="836" height="300" fill="#FFFFFF" fill-opacity="0.035"/>
    <rect x="0" y="0" width="836" height="150" fill="url(#sheen)"/>
    <rect x="1" y="1" width="834" height="1.5" fill="#FFFFFF" fill-opacity="0.10"/>
  </g>
  <rect x="0.5" y="0.5" width="835" height="299" rx="22" fill="none" stroke="url(#edge)"/>
  <text x="44" y="52" font-size="13" font-weight="600" letter-spacing="4" fill="#A6A6B2">ABOUT</text>
  <text x="42" y="140" font-size="40" font-weight="800" fill="#F6F6F8">Breaking things</text>
  <text x="42" y="188" font-size="40" font-weight="800" fill="#F6F6F8">to understand them.</text>
  <text x="44" y="256" font-size="16" font-weight="500" letter-spacing="0.5" fill="#9EA0AC"
        font-family="'JetBrains Mono', Consolas, monospace">&gt; open to collaborations</text>
  <rect x="282" y="244" width="10" height="16" fill="#DC2626"/>

  <!-- LEARNING (glass) -->
  <g clip-path="url(#cL)">
    <rect x="860" y="0" width="420" height="140" fill="#0A0A0C"/>
    <g filter="url(#glow)"><ellipse cx="1210" cy="10" rx="220" ry="150" fill="url(#gLearn)"/></g>
    <rect x="860" y="0" width="420" height="140" fill="#FFFFFF" fill-opacity="0.035"/>
    <rect x="860" y="0" width="420" height="70" fill="url(#sheen)"/>
    <rect x="861" y="1" width="418" height="1.5" fill="#FFFFFF" fill-opacity="0.10"/>
  </g>
  <rect x="860.5" y="0.5" width="419" height="139" rx="22" fill="none" stroke="url(#edge)"/>
  <text x="892" y="50" font-size="12" font-weight="600" letter-spacing="3" fill="#8A8A93">STATUS</text>
  <g fill="none" stroke="#8FDBF7" stroke-opacity="0.85">
    <circle cx="1214" cy="44" r="24"/>
    <circle cx="1214" cy="44" r="14"/>
  </g>
  <circle cx="1214" cy="44" r="4.5" fill="#8FDBF7"/>
  <text x="892" y="106" font-size="22" font-weight="700" letter-spacing="2" fill="#EDEDF2">ALWAYS LEARNING</text>

  <!-- CRAFT (glass) -->
  <g clip-path="url(#cC)">
    <rect x="860" y="160" width="420" height="140" fill="#0A0A0C"/>
    <g filter="url(#glow)"><ellipse cx="1210" cy="170" rx="220" ry="150" fill="url(#gCraft)"/></g>
    <rect x="860" y="160" width="420" height="140" fill="#FFFFFF" fill-opacity="0.035"/>
    <rect x="860" y="160" width="420" height="70" fill="url(#sheen)"/>
    <rect x="861" y="161" width="418" height="1.5" fill="#FFFFFF" fill-opacity="0.10"/>
  </g>
  <rect x="860.5" y="160.5" width="419" height="139" rx="22" fill="none" stroke="url(#edge)"/>
  <text x="892" y="210" font-size="12" font-weight="600" letter-spacing="3" fill="#8A8A93">ETHOS</text>
  <path d="M1214 178 l7.3 14.8 16.3 2.4 -11.8 11.5 2.8 16.3 -14.6 -7.7 -14.6 7.7 2.8 -16.3 -11.8 -11.5 16.3 -2.4 Z" fill="#F5B301"/>
  <text x="892" y="266" font-size="22" font-weight="700" letter-spacing="2" fill="#EDEDF2">CRAFT MATTERS</text>
</svg>
