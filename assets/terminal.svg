    <text x="34" y="98"><tspan fill="#8B5CF6">zaufany@node</tspan><tspan fill="#5A5A64"> ~ %</tspan><tspan fill="#E8E8EE"> ./recon --target </tspan><tspan fill="#DC2626">██████</tspan></text>
