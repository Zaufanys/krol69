      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.40"/>
      <stop offset="55%" stop-color="#06B6D4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tEdge" x1="0" y1="0" x2="0" y2="1">
