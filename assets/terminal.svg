    <filter id="tBlur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="30"/></filter>
    <clipPath id="cT"><rect x="0" y="0" width="1280" height="240" rx="22"/></clipPath>
