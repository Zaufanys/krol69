    <text x="34" y="188"><tspan fill="#F59E0B">[~]</tspan><tspan fill="#B9B9C2"> decrypting keys  </tspan><tspan fill="#67E8F9">████████████</tspan><tspan fill="#2A2A31">░░░░</tspan><tspan fill="#B9B9C2">  78%</tspan></text>
    <text x="34" y="218"><tspan fill="#4ADE80">[+]</tspan><tspan fill="#E8E8EE"> shell acquired. welcome back.</tspan><tspan fill="#4ADE80"> ▮</tspan></text>
