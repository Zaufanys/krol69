<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 150" width="1280" height="150" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="mEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="mSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0E7490"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="m1"><rect x="0" y="0" width="410" height="150" rx="20"/></clipPath>
    <clipPath id="m2"><rect x="435" y="0" width="410" height="150" rx="20"/></clipPath>
    <clipPath id="m3"><rect x="870" y="0" width="410" height="150" rx="20"/></clipPath>
  </defs>

  <!-- OUTPUT: bars -->
  <g clip-path="url(#m1)">
    <rect x="0" y="0" width="410" height="150" fill="#08080B"/>
    <rect x="0" y="0" width="410" height="150" fill="#FFFFFF" fill-opacity="0.03"/>
    <rect x="0" y="0" width="410" height="75" fill="url(#mSheen)"/>
    <rect x="1" y="1" width="408" height="1.4" fill="#FFFFFF" fill-opacity="0.09"/>
  </g>
  <rect x="0.5" y="0.5" width="409" height="149" rx="20" fill="none" stroke="url(#mEdge)"/>
  <text x="30" y="40" font-size="12" font-weight="600" letter-spacing="3" fill="#8A8A93">OUTPUT</text>
  <g fill="url(#bar)">
    <rect x="30" y="82" width="26" height="40" rx="4"/>
    <rect x="72" y="66" width="26" height="56" rx="4"/>
    <rect x="114" y="74" width="26" height="48" rx="4"/>
    <rect x="156" y="50" width="26" height="72" rx="4"/>
    <rect x="198" y="60" width="26" height="62" rx="4"/>
    <rect x="240" y="38" width="26" height="84" rx="4">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.4s" repeatCount="indefinite"/>
    </rect>
  </g>
  <text x="330" y="70" text-anchor="middle" font-size="34" font-weight="800" fill="#EDEDF2">∞</text>
  <text x="330" y="94" text-anchor="middle" font-size="11" letter-spacing="2" fill="#7A7A83">COMMITS</text>

  <!-- SIGNAL: gauge -->
  <g clip-path="url(#m2)">
    <rect x="435" y="0" width="410" height="150" fill="#08080B"/>
    <rect x="435" y="0" width="410" height="150" fill="#FFFFFF" fill-opacity="0.03"/>
    <rect x="435" y="0" width="410" height="75" fill="url(#mSheen)"/>
    <rect x="436" y="1" width="408" height="1.4" fill="#FFFFFF" fill-opacity="0.09"/>
  </g>
  <rect x="435.5" y="0.5" width="409" height="149" rx="20" fill="none" stroke="url(#mEdge)"/>
  <text x="465" y="40" font-size="12" font-weight="600" letter-spacing="3" fill="#8A8A93">SIGNAL</text>
  <path d="M594 122 A 46 46 0 0 1 686 122" fill="none" stroke="#23232B" stroke-width="9" stroke-linecap="round"/>
  <path d="M594 122 A 46 46 0 0 1 679 94" fill="none" stroke="#8B5CF6" stroke-width="9" stroke-linecap="round"/>
  <circle cx="679" cy="94" r="5" fill="#C4B5FD">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <text x="640" y="116" text-anchor="middle" font-size="26" font-weight="800" fill="#EDEDF2">82</text>
  <text x="760" y="72" text-anchor="middle" font-size="30" font-weight="800" fill="#EDEDF2">◈</text>
  <text x="760" y="96" text-anchor="middle" font-size="11" letter-spacing="2" fill="#7A7A83">FOCUS</text>

  <!-- MOMENTUM: sparkline -->
  <g clip-path="url(#m3)">
    <rect x="870" y="0" width="410" height="150" fill="#08080B"/>
    <rect x="870" y="0" width="410" height="150" fill="#FFFFFF" fill-opacity="0.03"/>
    <rect x="870" y="0" width="410" height="75" fill="url(#mSheen)"/>
    <rect x="871" y="1" width="408" height="1.4" fill="#FFFFFF" fill-opacity="0.09"/>
    <path d="M902 118 L940 96 L978 108 L1016 74 L1054 90 L1092 60 L1130 80 L1168 50 L1206 66 L1244 42 L1244 130 L902 130 Z" fill="url(#spark)"/>
    <path d="M902 118 L940 96 L978 108 L1016 74 L1054 90 L1092 60 L1130 80 L1168 50 L1206 66 L1244 42" fill="none" stroke="#22D3EE" stroke-width="2.4" stroke-linejoin="round"/>
    <circle r="4.5" fill="#67E8F9">
      <animateMotion dur="5s" repeatCount="indefinite" path="M902 118 L940 96 L978 108 L1016 74 L1054 90 L1092 60 L1130 80 L1168 50 L1206 66 L1244 42"/>
    </circle>
  </g>
  <rect x="870.5" y="0.5" width="409" height="149" rx="20" fill="none" stroke="url(#mEdge)"/>
  <text x="900" y="40" font-size="12" font-weight="600" letter-spacing="3" fill="#8A8A93">MOMENTUM</text>
</svg>
